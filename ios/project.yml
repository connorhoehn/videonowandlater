name: VideoNowAndLater
options:
  bundleIdPrefix: com.videonowandlater
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

packages:
  AmazonIVSPlayer:
    path: Packages/AmazonIVSPlayer
  AmazonIVSBroadcast:
    path: Packages/AmazonIVSBroadcast
  AmazonIVSChatMessaging:
    path: Packages/AmazonIVSChatMessaging

targets:
  VideoNowAndLater:
    type: application
    platform: iOS
    sources:
      - VideoNowAndLater
    settings:
      base:
        INFOPLIST_FILE: VideoNowAndLater/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.videonowandlater.ios
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release: {}
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    dependencies:
      - package: AmazonIVSPlayer
        product: AmazonIVSPlayer
      - package: AmazonIVSBroadcast
        product: AmazonIVSBroadcast
      - package: AmazonIVSChatMessaging
        product: AmazonIVSChatMessaging
    entitlements:
      path: VideoNowAndLater/VideoNowAndLater.entitlements
